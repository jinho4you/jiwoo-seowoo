<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커서 뭐 되지? 🔮</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(.82) translateY(24px); }
      65%  { transform: scale(1.03) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(139,92,246,.7); }
      70%  { box-shadow: 0 0 0 18px rgba(139,92,246,0); }
      100% { box-shadow: 0 0 0 0  rgba(139,92,246,0); }
    }
    @keyframes pokeball-shake {
      0%,100% { transform: rotate(0deg) translateY(0); }
      15%      { transform: rotate(-18deg) translateY(-6px); }
      35%      { transform: rotate(14deg) translateY(-10px); }
      55%      { transform: rotate(-10deg) translateY(-6px); }
      75%      { transform: rotate(6deg) translateY(-2px); }
    }
    @keyframes holo {
      0%   { background-position: 0% 50%; opacity:.5; }
      50%  { background-position: 100% 50%; opacity:.9; }
      100% { background-position: 0% 50%; opacity:.5; }
    }
    @keyframes pokemon-glow {
      0%,100% { filter: drop-shadow(0 6px 20px rgba(0,0,0,.6)) brightness(1); }
      50%      { filter: drop-shadow(0 6px 32px rgba(255,255,255,.18)) brightness(1.12); }
    }

    .float      { animation: float 3.2s ease-in-out infinite; }
    .float-slow { animation: float 4.5s ease-in-out infinite; }

    .shimmer-text {
      background: linear-gradient(90deg,#fff 0%,#c4b5fd 45%,#818cf8 55%,#fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.4s linear infinite;
    }

    .trait-btn { transition: all .18s ease; }
    .trait-btn.selected {
      background: linear-gradient(135deg,#7c3aed,#4f46e5);
      color: #fff;
      border-color: transparent;
      transform: scale(1.06);
      box-shadow: 0 4px 14px rgba(124,58,237,.45);
    }

    .career-card {
      opacity: 0;
      animation: popIn .6s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* Pokéball */
    .pokeball {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #ef4444 50%, #f9fafb 50%);
      border: 5px solid #111827;
      position: relative;
      animation: pokeball-shake 1s ease-in-out infinite;
    }
    .pokeball::before {
      content: '';
      position: absolute;
      top: 50%; left: -5px;
      width: calc(100% + 10px); height: 5px;
      background: #111827;
      transform: translateY(-50%);
    }
    .pokeball::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 16px; height: 16px;
      background: #f9fafb;
      border-radius: 50%;
      border: 4px solid #111827;
      z-index: 5;
    }

    /* Holographic card shimmer */
    .holo {
      position: absolute; inset: 0;
      background: linear-gradient(
        115deg,
        transparent 20%,
        rgba(255,255,255,.06) 40%,
        rgba(255,255,255,.13) 50%,
        rgba(255,255,255,.06) 60%,
        transparent 80%
      );
      background-size: 200% 200%;
      animation: holo 3.5s ease infinite;
      pointer-events: none;
      border-radius: inherit;
    }

    .pokemon-img { animation: pokemon-glow 3s ease-in-out infinite; }
    .pulse-btn   { animation: pulse-ring 2s ease infinite; }
    input:focus  { outline: none; }
    .pixel       { image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>
</head>
<body class="bg-[#0a0a0f] min-h-screen text-white">

        <button class="trait-btn px-4 py-2 rounded-full border-2 border-gray-700 bg-gray-800 text-gray-300 text-sm font-bold" data-trait="책">📚 책 읽기</button>

        <button class="trait-btn px-4 py-2 rounded-full border-2 border-gray-700 bg-gray-800 text-gray-300 text-sm font-bold" data-trait="요리">🍳 요리하기</button>
        <button class="trait-btn px-4 py-2 rounded-full border-2 border-gray-700 bg-gray-800 text-gray-300 text-sm font-bold" data-trait="과학">🔬 실험하기</button>
        <button class="trait-btn px-4 py-2 rounded-full border-2 border-gray-700 bg-gray-800 text-gray-300 text-sm font-bold" data-trait="음악">🎵 음악/노래</button>
        <button class="trait-btn px-4 py-2 rounded-full border-2 border-gray-700 bg-gray-800 text-gray-300 text-sm font-bold" data-trait="컴퓨터">💻 컴퓨터</button>

      <button

        <div class="pokeball"></div>
      </div>
      <p id="loadingMsg" class="text-violet-300 font-bold text-lg mb-2">포켓몬을 찾는 중...</p>
      <p class="text-gray-600 text-sm">잠깐만 기다려줘!</p>
    </section>

    <!-- Results -->

        <p class="text-xs text-violet-400 font-black tracking-widest uppercase mb-2">포켓몬 분석 완료 ✨</p>

          📤 공유하기
        </button>
      </div>
    </section>

  </main>

          quote: '라티아~스♡ 온 세상을 함께 날아다녀요! 어서 와요!'
        }
      },
      {
        title: '선생님 / 교육 크리에이터',
        from: '#1a0a00', to: '#713f12',
        badge: '💛 영향력 직업',
        desc: '미래의 천재들을 키워내는 사람! 유튜브 선생님이 되면 100만 명에게 가르칠 수 있어요.',
        tip: '교육 유튜브 채널이 가장 빠르게 성장하는 카테고리예요.',
        traits: ['책', '친구', '수학', '음악'],
        pokemon: {
          id: 25, name: '피카츄', type: '⚡ 전기타입', typeColor: '#eab308',
          quote: '피카피카! 선생님이 최고야! 같이 공부해요, 피카!⚡'
        }
      },
    ];

    const LOADING_MSGS = [
      '포켓몬을 찾는 중...',
      '적성 데이터를 분석 중...',
      '포켓몬이 점치는 중...',
      '딱 맞는 직업 발견! 🎉',
    ];

    function getSelectedTraits() {
      return [...document.querySelectorAll('.trait-btn.selected')].map(b => b.dataset.trait);
    }

    function pickCareers(selected) {
      if (!selected.length) return [...CAREERS].sort(() => Math.random() - .5).slice(0, 3);
      const scored = CAREERS.map(c => ({
        ...c,
        score: c.traits.filter(t => selected.includes(t)).length + Math.random() * .6
      }));
      return scored.sort((a, b) => b.score - a.score).slice(0, 3);
    }

    function handleSubmit() {
      const name = document.getElementById('nameInput').value.trim() || '지우서우';
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');

      let idx = 0;
      const msgEl = document.getElementById('loadingMsg');
      const iv = setInterval(() => {
        idx = (idx + 1) % LOADING_MSGS.length;
        msgEl.textContent = LOADING_MSGS[idx];
      }, 600);

      setTimeout(() => {
        clearInterval(iv);
        renderResults(name, pickCareers(getSelectedTraits()));
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 2500);
    }

    function renderResults(name, picked) {
      document.getElementById('resultTitle').textContent =
        `${name}이(가) 커서 될 수 있는 직업 TOP 3! 🎊`;

      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';

      const medals = ['🥇', '🥈', '🥉'];
      const ranks  = ['가장 잘 어울려요!', '꽤 잘 맞아요!', '이것도 좋아요!'];

      picked.forEach((c, i) => {
        const artUrl    = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${c.pokemon.id}.png`;
        const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${c.pokemon.id}.png`;

        const card = document.createElement('div');
        card.className = 'career-card rounded-3xl overflow-hidden shadow-2xl';
        card.style.cssText = `animation-delay:${i * .2}s; border: 1px solid rgba(255,255,255,0.08);`;

        card.innerHTML = `
          <!-- Pokemon card top: gradient + image -->
          <div class="relative" style="background:linear-gradient(160deg,${c.from} 0%,${c.to} 100%)">
            <div class="holo"></div>

            <!-- Top bar: medal | type badge -->
            <div class="relative z-10 flex items-center justify-between px-5 pt-4">
              <span class="text-xs font-black text-white/80 bg-black/30 backdrop-blur px-3 py-1.5 rounded-full">
                ${medals[i]} ${ranks[i]}
              </span>
              <span class="text-xs font-black px-3 py-1.5 rounded-full text-white" style="background:${c.pokemon.typeColor}99">
                ${c.pokemon.type}
              </span>
            </div>

            <!-- Pokemon image -->
            <div class="relative z-10 flex justify-center pt-3 pb-2">
              <img
                src="${artUrl}"
                alt="${c.pokemon.name}"
                class="pokemon-img w-44 h-44 object-contain"
                onerror="this.src='${spriteUrl}';this.classList.remove('w-44','h-44');this.classList.add('w-24','h-24','pixel')"
              >
            </div>

            <!-- Career title -->
            <div class="relative z-10 text-center px-5 pb-5">
              <h3 class="text-2xl font-black text-white drop-shadow-md">${c.title}</h3>
              <span class="inline-block mt-1.5 text-xs font-bold px-3 py-1 rounded-full text-white bg-black/25 backdrop-blur">
                ${c.badge}
              </span>
            </div>
          </div>

          <!-- Card body -->
          <div class="bg-gray-900 px-5 py-5">

            <!-- Speech bubble -->
            <div class="relative bg-gray-800 rounded-2xl rounded-tl-sm p-4 mb-5">
              <!-- triangle pointing to pokemon -->
              <div class="absolute -top-2.5 left-6 w-5 h-5 bg-gray-800 rotate-45 rounded-sm"></div>
              <p class="text-[11px] font-black tracking-widest uppercase mb-1.5" style="color:${c.pokemon.typeColor}">
                ${c.pokemon.name}
              </p>
              <p class="text-white text-sm font-bold leading-relaxed">
                "${c.pokemon.quote}"
              </p>
            </div>

            <!-- Description -->
            <p class="text-gray-300 text-[15px] leading-relaxed mb-4">${c.desc}</p>

            <!-- Tip -->
            <div class="bg-gray-800 rounded-2xl px-4 py-3 flex gap-2.5 items-start">
              <span class="text-yellow-400 shrink-0 mt-0.5">💡</span>
              <p class="text-gray-400 text-sm leading-relaxed">${c.tip}</p>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function resetForm() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
      document.getElementById('nameInput').value = '';
      document.querySelectorAll('.trait-btn.selected').forEach(b => b.classList.remove('selected'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shareResult(btn) {
      const name = document.getElementById('nameInput').value.trim() || '지우서우';
      const text = `${name}이(가) 커서 될 직업을 포켓몬이 알려줬어요! 🔮\n나도 해보기 → ${window.location.href}`;
      const orig = btn.innerHTML;
      if (navigator.share) {
        navigator.share({ title: '커서 뭐 되지? 🔮', text }).catch(() => {});
        return;
      }
      navigator.clipboard?.writeText(text).then(() => {
        btn.innerHTML = '✅ 복사됐어요!';
        setTimeout(() => (btn.innerHTML = orig), 2200);
      });
    }
  </script>
</body>
</html>
